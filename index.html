<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOT: THE FINAL STAND - REVOLUTION</title>
    <link rel="stylesheet" href="style.css">
    
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <div id="character-selection-screen">
        <div class="menu-background"></div>
        <div class="menu-content">
            <h1 class="game-title">ATTACK ON TITAN</h1>
            <h2 class="menu-subtitle">CHỌN CHIẾN BINH CỦA BẠN</h2>
            <div class="character-container">
                <div class="char-card" id="char-eren" onclick="selectCharacter('Eren Jaeger')">
                    <img src="eren.png" alt="Eren" class="char-img">
                    <div class="char-info"><h3>EREN JAEGER</h3><p>Titan Tiến Công</p></div>
                </div>
                <div class="char-card" id="char-levi" onclick="selectCharacter('Levi Ackerman')">
                    <img src="levi.png" alt="Levi" class="char-img">
                    <div class="char-info"><h3>LEVI ACKERMAN</h3><p>Mạnh Nhất Nhân Loại</p></div>
                </div>
            </div>
            <button id="start-game-btn" class="disabled" onclick="startGame()" disabled>BẮT ĐẦU CHUYẾN TRINH SÁT</button>
        </div>
    </div>

    <div id="game-hud" class="hidden">
        <div id="status-bar">
            <span>NHÂN VẬT: <b id="current-char-display"></b></span>
            <span>DI CHUYỂN: <b>W,A,S,D + CHUỘT</b></span>
            <span>CHIẾN ĐẤU: <b>CLICK CHUỘT</b></span>
        </div>
        <div id="npc-subtitle"></div>
    </div>

    <canvas id="game-canvas"></canvas>
    <script type="module" src="script.js"></script>
</body>
</html>
